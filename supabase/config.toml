# Конфигурация Supabase CLI. project_id используется для локальной разработки;
# в CI/деплое проект указывается через --project-ref (секрет GitHub).
project_id = "seoul-trip"

# Функции вызываются из браузера без пользовательского JWT.
[functions.resolve-link]
verify_jwt = false

[functions.search-places]
verify_jwt = false

[functions.generate-itinerary]
verify_jwt = false

[functions.geocode]
verify_jwt = false

[functions.trends]
verify_jwt = false

[functions.suggest-checklist]
verify_jwt = false

# Telegram-вебхук: зовётся Telegram'ом без JWT (защита — секрет в заголовке).
[functions.telegram-webhook]
verify_jwt = false

[functions.describe-places]
verify_jwt = false

[functions.image-search]
verify_jwt = false

[functions.route]
verify_jwt = false
